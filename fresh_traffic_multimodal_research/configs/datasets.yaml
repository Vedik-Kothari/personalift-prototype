datasets:
  uvh26:
    enabled: true
    country: India
    city: Bengaluru
    modality: vision
    local_path: data/raw/uvh26
    license_note: "Verify official use terms before redistribution."
    classes: [car, motorcycle, auto_rickshaw, bus, truck, bicycle, pedestrian]
  driveindia:
    enabled: true
    country: India
    modality: vision
    local_path: data/raw/driveindia
    license_note: "Use only in accordance with the dataset paper and source license."
    classes: [car, motorcycle, auto_rickshaw, bus, truck, bicycle, pedestrian, emergency_vehicle]
  dats2022:
    enabled: true
    country: India
    modality: vision
    local_path: data/raw/dats2022
    license_note: "Use per source conditions."
    classes: [car, motorcycle, auto_rickshaw, bus, truck, bicycle, pedestrian]
  indian_road_dataset:
    enabled: true
    country: India
    modality: vision
    local_path: data/raw/indian_road_dataset
    license_note: "Check dataset card for permitted academic usage."
    classes: [car, motorcycle, auto_rickshaw, bus, truck, bicycle, pedestrian]
  emergency_vehicle_support:
    enabled: false
    country: India
    modality: vision
    local_path: data/raw/emergency_support
    license_note: "Optional support set for emergency-vehicle specialization."
    classes: [ambulance, fire_truck, police_vehicle]

normalization:
  class_aliases:
    motorbike: motorcycle
    bike: motorcycle
    autorickshaw: auto_rickshaw
    auto: auto_rickshaw
    ambulance: emergency_vehicle
    fire_engine: emergency_vehicle
    police_car: emergency_vehicle
  canonical_classes:
    - car
    - motorcycle
    - auto_rickshaw
    - bus
    - truck
    - bicycle
    - pedestrian
    - emergency_vehicle
