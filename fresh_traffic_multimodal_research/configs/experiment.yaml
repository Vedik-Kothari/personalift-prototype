project:
  name: indian_multimodal_traffic_control
  region: India
  target_device_local: cpu
  target_device_remote: kaggle_gpu

vision:
  model_name: yolov8n
  image_size: 640
  epochs: 40
  batch_size_local: 4
  batch_size_kaggle: 16
  freeze_backbone_epochs: 5
  max_train_images_for_pilot: 2000

reasoning:
  model_name: distilbert-base-uncased
  max_length: 128
  epochs: 4
  batch_size_local: 8
  batch_size_kaggle: 32
  learning_rate: 2.0e-5
  freeze_encoder_layers: 4

control:
  min_green_sec: 12
  max_green_sec: 45
  yellow_sec: 3
  all_red_sec: 2
  emergency_priority_weight: 2.0
  queue_weight: 1.0
  wait_weight: 0.8
